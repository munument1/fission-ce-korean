name: Build

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize

defaults:
  run:
    shell: bash

jobs:
  static-analysis:
    name: Static analysis
    runs-on: ubuntu-latest
    steps:
      - name: Install
        run: |
          sudo apt update
          sudo apt install cppcheck

      - name: Clone
        uses: actions/checkout@v4

      - name: cppcheck
        run: cppcheck --std=c++17 src/

  code-format:
    name: Code Formatting
    runs-on: ubuntu-latest
    if: |
      github.actor != 'github-actions[bot]' &&
      (github.event_name != 'push' || github.event.head_commit.message != 'chore: auto-format with clang-format') &&
      (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up clang-format
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format-18
          echo "CLANG_FORMAT_VERSION=$(clang-format-18 --version)" >> $GITHUB_ENV
          
      - name: Check for skip-formatting label (PR only)
        if: github.event_name == 'pull_request'
        run: |
          echo "Checking PR labels..."
          if gh pr view ${{ github.event.pull_request.number }} --repo "${{ github.repository }}" --json labels --jq '.labels[].name' | grep -q "skip-formatting"; then
            echo "skip-formatting=true" >> $GITHUB_ENV
            echo "skip-formatting label found - skipping format checks"
          else
            echo "No skip-formatting label found"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check formatting
        if: env.skip-formatting != 'true'
        id: check-formatting
        run: |
          echo "Checking code formatting with $CLANG_FORMAT_VERSION"
          if ! find src -type f \( -name "*.cc" -o -name "*.h" \) -print0 | xargs -0 clang-format-18 --dry-run --Werror; then
            echo "format_needed=true" >> $GITHUB_ENV
            echo "Formatting issues found - will attempt to auto-format"
          else
            echo "Code is properly formatted"
          fi
          
      - name: Auto-format if needed
        if: env.format_needed == 'true' && env.skip-formatting != 'true'
        run: |
          echo "Applying clang-format..."
          find src -type f \( -name "*.cc" -o -name "*.h" \) -print0 | xargs -0 clang-format-18 -i
          
          # Check if there are changes after formatting
          if ! git diff --quiet; then
            echo "Committing formatting changes..."
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -u
            git commit -m "chore: auto-format with clang-format"
            git push
            echo "Formatting changes pushed"
          else
            echo "No formatting changes after auto-format"
          fi
          
  android:
    name: Android

    runs-on: ubuntu-latest

    steps:
      - name: Clone
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 11
          cache: gradle

      - name: Cache cmake build
        uses: actions/cache@v4
        with:
          path: os/android/app/.cxx
          key: android-cmake-v100

      - name: Setup signing config
        if: env.KEYSTORE_FILE_BASE64 != '' && env.KEYSTORE_PROPERTIES_FILE_BASE64 != ''
        run: |
          cd os/android
          echo "$KEYSTORE_FILE_BASE64" | base64 --decode > debug.keystore
          echo "$KEYSTORE_PROPERTIES_FILE_BASE64" | base64 --decode > debug-keystore.properties
        env:
          KEYSTORE_FILE_BASE64: ${{ secrets.ANDROID_DEBUG_KEYSTORE_FILE_BASE64 }}
          KEYSTORE_PROPERTIES_FILE_BASE64: ${{ secrets.ANDROID_DEBUG_KEYSTORE_PROPERTIES_FILE_BASE64 }}

      - name: Build
        run: |
          cd os/android
          ./gradlew assembleDebug

      - name: Change apk file name
        run: |
          mv os/android/app/build/outputs/apk/debug/app-debug.apk os/android/app/build/outputs/apk/debug/fallout-fission.apk

      - name: Package Android with fission.dat
        run: |
          mkdir -p packaged
          # Copy APK
          cp os/android/app/build/outputs/apk/debug/fallout-fission.apk packaged/
          # Copy fission.dat
          cp os/macos/fission.dat packaged/
          # Create zip
          cd packaged
          zip fallout-fission-android.zip fallout-fission.apk fission.dat
          cd ..
          # Also copy zip to a common directory for the combined package job
          mkdir -p packages
          cp packaged/fallout-fission-android.zip packages/

      - name: Upload Android package
        uses: actions/upload-artifact@v4
        with:
          name: fallout-fission-android
          path: packages/fallout-fission-android.zip
          retention-days: 7

  ios:
    name: iOS

    runs-on: macos-14

    steps:
      - name: Clone
        uses: actions/checkout@v4

      - name: Cache cmake build
        uses: actions/cache@v4
        with:
          path: out
          key: ios-cmake-v100

      - name: Configure
        run: |
          cmake --preset ios

      - name: Build
        run: |
          cmake --build --preset ios-debug

      - name: Pack
        run: |
          cd out/build/ios
          cpack -C Debug

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: fallout-fission.ipa
          path:  out/build/ios/fallout-fission.ipa
          retention-days: 7

  linux:
    name: Linux (${{ matrix.arch }})

    runs-on: ubuntu-22.04

    strategy:
      fail-fast: false
      matrix:
        arch:
          - x86
          - x64

    steps:
      - name: Clone
        uses: actions/checkout@v4

      - name: Dependencies (x86)
        if: matrix.arch == 'x86'
        run: |
          sudo dpkg --add-architecture i386
          sudo apt update
          sudo apt install g++-multilib libsdl2-dev:i386 zlib1g-dev:i386

      - name: Dependencies (x64)
        if: matrix.arch == 'x64'
        run: |
          sudo apt update
          sudo apt install libsdl2-dev zlib1g-dev

      - name: Cache cmake build
        uses: actions/cache@v4
        with:
          path: out
          key: linux-${{ matrix.arch }}-cmake-v100

      - name: Configure
        run: |
          cmake --preset linux-${{ matrix.arch }}-debug

      - name: Build
        run: |
          cmake --build --preset linux-${{ matrix.arch }}-debug

      - name: Change executable file name
        run: |
          mv out/build/linux-${{ matrix.arch }}-debug/fallout2-ce out/build/linux-${{ matrix.arch }}-debug/fallout-fission-linux-${{ matrix.arch }}

      - name: Package Linux ${{ matrix.arch }} with fission.dat
        run: |
          mkdir -p packaged
          # Copy binary
          cp out/build/linux-${{ matrix.arch }}-debug/fallout-fission-linux-${{ matrix.arch }} packaged/
          # Copy fission.dat
          cp os/macos/fission.dat packaged/
          # Create zip
          cd packaged
          zip fallout-fission-linux-${{ matrix.arch }}.zip fallout-fission-linux-${{ matrix.arch }} fission.dat
          cd ..
          # Also copy zip to a common directory for the combined package job
          mkdir -p packages
          cp packaged/fallout-fission-linux-${{ matrix.arch }}.zip packages/

      - name: Upload Linux ${{ matrix.arch }} package
        uses: actions/upload-artifact@v4
        with:
          name: fallout-fission-linux-${{ matrix.arch }}
          path: packages/fallout-fission-linux-${{ matrix.arch }}.zip
          retention-days: 7

  linux-armhf:
    name: Linux (armhf)

    runs-on: ubuntu-22.04-arm

    steps:
      - name: Clone
        uses: actions/checkout@v4

      - name: Dependencies
        run: |
          sudo dpkg --add-architecture armhf
          sudo apt update
          sudo apt install gcc-arm-linux-gnueabihf g++-arm-linux-gnueabihf libsdl2-dev:armhf zlib1g-dev:armhf

      - name: Configure
        run: |
          cmake \
            -B build \
            -D CMAKE_BUILD_TYPE=Debug \
            -D FALLOUT_VENDORED=OFF \
            -D CMAKE_SYSTEM_PROCESSOR=arm \
            -D CMAKE_C_COMPILER=arm-linux-gnueabihf-gcc \
            -D CMAKE_CXX_COMPILER=arm-linux-gnueabihf-g++ \
            # EOL

      - name: Build
        run: cmake --build build

      - name: Change executable file name
        run: |
          mv build/fallout2-ce build/fallout-fission-linux-armhf

      - name: Package Linux ARMHF with fission.dat
        run: |
          mkdir -p packaged
          # Copy binary
          cp build/fallout-fission-linux-armhf packaged/
          # Copy fission.dat
          cp os/macos/fission.dat packaged/
          # Create zip
          cd packaged
          zip fallout-fission-linux-armhf.zip fallout-fission-linux-armhf fission.dat
          cd ..
          # Also copy zip to a common directory for the combined package job
          mkdir -p packages
          cp packaged/fallout-fission-linux-armhf.zip packages/

      - name: Upload Linux ARMHF package
        uses: actions/upload-artifact@v4
        with:
          name: fallout-fission-linux-armhf
          path: packages/fallout-fission-linux-armhf.zip
          retention-days: 7

  linux-arm64:
    name: Linux (arm64)

    runs-on: ubuntu-22.04-arm

    steps:
      - name: Clone
        uses: actions/checkout@v4

      - name: Dependencies
        run: |
          sudo apt update
          sudo apt install libsdl2-dev zlib1g-dev

      - name: Configure
        run: cmake -B build -D CMAKE_BUILD_TYPE=Debug -D FALLOUT_VENDORED=OFF

      - name: Build
        run: cmake --build build

      - name: Change executable file name
        run: |
          mv build/fallout2-ce build/fallout-fission-linux-arm64

      - name: Package Linux ARM64 with fission.dat
        run: |
          mkdir -p packaged
          # Copy binary
          cp build/fallout-fission-linux-arm64 packaged/
          # Copy fission.dat
          cp os/macos/fission.dat packaged/
          # Create zip
          cd packaged
          zip fallout-fission-linux-arm64.zip fallout-fission-linux-arm64 fission.dat
          cd ..
          # Also copy zip to a common directory for the combined package job
          mkdir -p packages
          cp packaged/fallout-fission-linux-arm64.zip packages/

      - name: Upload Linux ARM64 package
        uses: actions/upload-artifact@v4
        with:
          name: fallout-fission-linux-arm64
          path: packages/fallout-fission-linux-arm64.zip
          retention-days: 7

  macos:
    name: macOS

    runs-on: macos-14

    steps:
      - name: Clone
        uses: actions/checkout@v4

      - name: Cache cmake build
        uses: actions/cache@v4
        with:
          path: out
          key: macos-cmake-v100

      - name: Install GraphicsMagick and ImageMagick for DMG icon
        run: |
          brew install graphicsmagick imagemagick

      - name: Configure
        run: |
          cmake --preset macos

      - name: Build
        run: |
          cmake --build --preset macos-debug

      - name: Install create-dmg
        run: |
          npm install --global create-dmg

      - name: Find the built app
        run: |
          # Try the Debug location first, then the CPack location
          if [ -d "out/build/macos/Debug/Fallout-Fission.app" ]; then
            APP_PATH="out/build/macos/Debug/Fallout-Fission.app"
          elif [ -d "out/build/macos/_CPack_Packages/Darwin/DragNDrop/Fallout-Fission/Fallout-Fission.app" ]; then
            APP_PATH="out/build/macos/_CPack_Packages/Darwin/DragNDrop/Fallout-Fission/Fallout-Fission.app"
          else
            echo "Error: App not found in expected locations"
            find out/build/macos -name "*.app" -type d
            exit 1
          fi
          echo "Found app at: $APP_PATH"
          echo "APP_PATH=$APP_PATH" >> $GITHUB_ENV

      - name: Create DMG with create-dmg
        run: |
          mkdir -p dmg_output
          create-dmg \
            --dmg-title "Fallout-Fission" \
            --no-version-in-filename \
            --no-code-sign \
            "$APP_PATH" \
            dmg_output/

      - name: Rename DMG to consistent name
        run: |
          mv dmg_output/Fallout-Fission.dmg dmg_output/fallout-fission-macos.dmg

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: fallout-fission-macos.dmg
          path: dmg_output/fallout-fission-macos.dmg  # New create-dmg DMG
          retention-days: 7

  windows:
    name: Windows (${{ matrix.arch }})

    runs-on: windows-2025

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86
            generator-platform: Win32
          - arch: x64
            generator-platform: x64

    steps:
      - name: Clone
        uses: actions/checkout@v4

      - name: Install Visual Studio 2022 Build Tools with v141_xp
        shell: cmd
        run: |
          choco install visualstudio2022buildtools -y --package-parameters="'--add Microsoft.VisualStudio.Workload.VCTools --add Microsoft.VisualStudio.Component.VC.v141.x86.x64 --add Microsoft.VisualStudio.Component.VC.v141.xp --add Microsoft.VisualStudio.Component.VC.Tools.x86.x64 --add Microsoft.VisualStudio.Component.Windows10SDK.10240 --add Microsoft.VisualStudio.ComponentGroup.NativeDesktop.WinXP --add Microsoft.VisualStudio.Component.WinXP'"

      - name: Cache cmake deps
        uses: actions/cache@v4
        with:
          key: windows-${{ matrix.arch }}-cmake-v1-${{ hashFiles('CMakeLists.txt') }}
          path: |
            out/build/windows-${{ matrix.arch }}/_deps
            out/build/windows-${{ matrix.arch }}/CMakeFiles/CMakeDirectoryInformation.cmake

      - name: Configure
        shell: cmd
        run: |
          call "C:\Program Files (x86)\Microsoft Visual Studio\2019\BuildTools\Common7\Tools\VsDevCmd.bat" ^
          && cmake --preset windows-${{ matrix.arch }}

      - name: Build
        shell: cmd
        run: |
          call "C:\Program Files (x86)\Microsoft Visual Studio\2019\BuildTools\Common7\Tools\VsDevCmd.bat" ^
          && cmake --build --preset windows-${{ matrix.arch }}-release

      - name: Change executable file name
        run: |
          mv out/build/windows-${{ matrix.arch }}/RelWithDebInfo/fallout2-ce.exe out/build/windows-${{ matrix.arch }}/RelWithDebInfo/fallout-fission-${{ matrix.arch }}.exe

      - name: Package Windows ${{ matrix.arch }} with fission.dat
        shell: cmd
        run: |
          mkdir packaged
          copy out\build\windows-${{ matrix.arch }}\RelWithDebInfo\fallout-fission-${{ matrix.arch }}.exe packaged\
          copy os\macos\fission.dat packaged\
          cd packaged
          "C:\Program Files\7-Zip\7z.exe" a fallout-fission-windows-${{ matrix.arch }}.zip fallout-fission-${{ matrix.arch }}.exe fission.dat
          cd ..
          mkdir packages
          copy packaged\fallout-fission-windows-${{ matrix.arch }}.zip packages\

      - name: Upload Windows ${{ matrix.arch }} package
        uses: actions/upload-artifact@v4
        with:
          name: fallout-fission-windows-${{ matrix.arch }}
          path: packages/fallout-fission-windows-${{ matrix.arch }}.zip
          retention-days: 7

  package-combined:
    name: Package Combined Archive
    runs-on: ubuntu-latest
    needs: [android, linux, linux-armhf, linux-arm64, windows]  # Exclude ios and macos
    if: ${{ always() && github.ref == 'refs/heads/main' && github.event_name == 'push' }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Download packaged artifacts (excluding macOS and iOS)
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          
      - name: Create combined directory structure
        run: |
          # Create main directory
          mkdir -p fallout-fission-combined
          
          # Copy fission.dat file 
          cp os/macos/fission.dat fallout-fission-combined/
          
          # Process downloaded artifacts and extract them to combined directory
          cd artifacts
          
          for artifact_dir in *; do
            if [ -d "$artifact_dir" ]; then
              cd "$artifact_dir"
              # Extract each zip to the combined directory
              for zipfile in *.zip; do
                if [ -f "$zipfile" ]; then
                  echo "Extracting $zipfile"
                  unzip -o "$zipfile" -d ../../fallout-fission-combined/
                fi
              done
              cd ..
            fi
          done
          cd ..
          
          # List contents for verification
          echo "Combined package contents:"
          ls -la fallout-fission-combined/
          
      - name: Create combined zip archive
        run: |
          zip -r fallout-fission-combined.zip fallout-fission-combined/
          ls -la *.zip
          
      - name: Upload combined archive as artifact
        uses: actions/upload-artifact@v4
        with:
          name: fallout-fission-combined
          path: fallout-fission-combined.zip
          retention-days: 7

  release:
    name: Release Beta build
    runs-on: ubuntu-latest
    needs: [android, ios, linux, linux-armhf, linux-arm64, macos, windows, package-combined]
    permissions: write-all
    if: ${{ always() && github.ref == 'refs/heads/main' && github.event_name == 'push' }}
    
    steps:
      - name: Fetch artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Remove old release
        uses: dev-drprasad/delete-tag-and-release@v0.2.1
        with:
          delete_release: true
          tag_name: beta
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Process artifacts for release
        run: |
          # Create release directory
          mkdir -p release-files
          
          # Move all packaged zips to release files
          cd artifacts
          for artifact_dir in *; do
            if [ -d "$artifact_dir" ]; then
              cd "$artifact_dir"
              for file in *; do
                if [ -f "$file" ]; then
                  echo "Moving $file to release-files/"
                  mv "$file" ../../release-files/
                fi
              done
              cd ..
            fi
          done
          cd ..
          
          # List release files
          echo "Release files:"
          ls -la release-files/

      - name: Allow GitHub to process removed release for few seconds
        run: |
          sleep 20s

      - name: Upload new release
        uses: softprops/action-gh-release@v0.1.15
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          files: release-files/*
          tag_name: beta
          draft: false
          prerelease: true
          name: Fallout Fission Beta Build
