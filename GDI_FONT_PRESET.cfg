[system]
language=korean

[font]
# Use the Windows GDI renderer derived from the legacy Korean fallout2font.dll.
gdi_renderer=1
ttf_renderer=0
legacy_codepage=949

# Small text uses crisp non-antialiased Dotum; large text keeps NanumBarunGothic.
gdi_text_face=Dotum
gdi_text_size=11
gdi_text_weight=400
gdi_text_line_height=11
gdi_button_face=NanumBarunGothic
gdi_button_size=15
gdi_button_weight=400
gdi_button_line_height=17

# Font 104 is used for title/main-menu text.
gdi_title_face=NanumBarunGothic
gdi_title_size=18
gdi_title_weight=400
gdi_title_line_height=20

# Midpoint threshold removes the antialias fringe that made small glyphs too thick.
gdi_binary_threshold=128
baseline_offset=0
